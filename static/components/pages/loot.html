<!-- loot 页面 - 战利品/信息收集管理 -->
<div id="lootPage" class="page-content">
    <div class="max-w-full mx-auto px-6 py-6">
        <!-- 页面标题和统计卡片 -->
        <div class="flex items-center justify-between mb-6">
            <div class="flex items-center gap-3">
                <i class="fas fa-trophy text-yellow-400 text-2xl"></i>
                <h2 class="text-2xl font-bold">战利品 / 信息收集</h2>
                <span id="lootUnreadBadge" class="hidden bg-red-500 text-white text-xs px-2 py-0.5 rounded-full font-bold">0</span>
            </div>
            <div class="flex items-center space-x-3">
                <button onclick="window.refreshLootPage()" class="px-3 py-2 bg-gray-700 hover:bg-gray-600 rounded-lg text-sm transition-colors">
                    <i class="fas fa-sync-alt mr-1"></i>刷新
                </button>
                <button onclick="window.markAllLootRead()" class="px-3 py-2 bg-blue-600 hover:bg-blue-500 rounded-lg text-sm transition-colors">
                    <i class="fas fa-check-double mr-1"></i>全部已读
                </button>
                <button onclick="window.downloadLootZip()" class="px-3 py-2 bg-green-600 hover:bg-green-500 rounded-lg text-sm transition-colors">
                    <i class="fas fa-file-archive mr-1"></i>批量下载
                </button>
                <button onclick="window.clearAllLoot()" class="px-3 py-2 bg-red-600 hover:bg-red-500 rounded-lg text-sm transition-colors">
                    <i class="fas fa-trash mr-1"></i>清空
                </button>
            </div>
        </div>

        <!-- 统计卡片 -->
        <div class="grid grid-cols-2 md:grid-cols-5 gap-4 mb-6">
            <div class="bg-gray-800 rounded-lg p-4 border border-gray-700">
                <div class="flex items-center gap-3">
                    <div class="p-2 bg-yellow-500/10 rounded-lg">
                        <i class="fas fa-trophy text-yellow-400"></i>
                    </div>
                    <div>
                        <div class="text-2xl font-bold" id="lootStatTotal">0</div>
                        <div class="text-xs text-gray-400">总数</div>
                    </div>
                </div>
            </div>
            <div class="bg-gray-800 rounded-lg p-4 border border-gray-700">
                <div class="flex items-center gap-3">
                    <div class="p-2 bg-red-500/10 rounded-lg">
                        <i class="fas fa-envelope text-red-400"></i>
                    </div>
                    <div>
                        <div class="text-2xl font-bold" id="lootStatUnread">0</div>
                        <div class="text-xs text-gray-400">未读</div>
                    </div>
                </div>
            </div>
            <div class="bg-gray-800 rounded-lg p-4 border border-gray-700">
                <div class="flex items-center gap-3">
                    <div class="p-2 bg-purple-500/10 rounded-lg">
                        <i class="fas fa-key text-purple-400"></i>
                    </div>
                    <div>
                        <div class="text-2xl font-bold" id="lootStatCredentials">0</div>
                        <div class="text-xs text-gray-400">凭据</div>
                    </div>
                </div>
            </div>
            <div class="bg-gray-800 rounded-lg p-4 border border-gray-700">
                <div class="flex items-center gap-3">
                    <div class="p-2 bg-green-500/10 rounded-lg">
                        <i class="fas fa-calendar-day text-green-400"></i>
                    </div>
                    <div>
                        <div class="text-2xl font-bold" id="lootStatToday">0</div>
                        <div class="text-xs text-gray-400">今日</div>
                    </div>
                </div>
            </div>
            <div class="bg-gray-800 rounded-lg p-4 border border-gray-700">
                <div class="flex items-center gap-3">
                    <div class="p-2 bg-blue-500/10 rounded-lg">
                        <i class="fas fa-broadcast-tower text-blue-400"></i>
                    </div>
                    <div>
                        <div class="text-2xl font-bold" id="lootStatBeacons">0</div>
                        <div class="text-xs text-gray-400">Beacon</div>
                    </div>
                </div>
            </div>
        </div>

        <!-- 过滤器 -->
        <div class="flex flex-wrap items-center gap-4 mb-6 bg-gray-800 p-4 rounded-lg border border-gray-700">
            <div class="flex items-center gap-2">
                <label class="text-sm text-gray-400">分类:</label>
                <select id="lootCategoryFilter" onchange="window.filterLootItems()" class="bg-gray-700 border border-gray-600 rounded-lg px-3 py-1.5 text-sm focus:border-yellow-500 focus:outline-none">
                    <option value="">全部分类</option>
                    <option value="credentials">🔑 凭据</option>
                    <option value="system_info">💻 系统信息</option>
                    <option value="network">🌐 网络信息</option>
                    <option value="browser">🌍 浏览器数据</option>
                    <option value="custom">📦 其他</option>
                </select>
            </div>
            <div class="flex items-center gap-2">
                <label class="text-sm text-gray-400">来源:</label>
                <select id="lootSourceFilter" onchange="window.filterLootItems()" class="bg-gray-700 border border-gray-600 rounded-lg px-3 py-1.5 text-sm focus:border-yellow-500 focus:outline-none">
                    <option value="">全部来源</option>
                </select>
            </div>
            <div class="flex items-center gap-2">
                <label class="text-sm text-gray-400">搜索:</label>
                <input id="lootSearchInput" type="text" placeholder="搜索标题或内容..." oninput="window.searchLootItems()"
                    class="bg-gray-700 border border-gray-600 rounded-lg px-3 py-1.5 text-sm focus:border-yellow-500 focus:outline-none w-64" />
            </div>
            <div class="ml-auto text-sm text-gray-400">
                共 <span id="lootFilteredCount">0</span> 条
            </div>
        </div>

        <!-- 战利品列表 -->
        <div id="lootItemsContainer" class="space-y-3">
            <div class="text-center py-12 text-gray-400">
                <i class="fas fa-trophy text-4xl mb-4 text-gray-600"></i>
                <p class="text-lg">暂无战利品数据</p>
                <p class="text-sm mt-2">当自动化武器DLL执行完毕后，收集到的信息将显示在这里</p>
            </div>
        </div>

        <!-- 分页 -->
        <div id="lootPagination" class="hidden flex items-center justify-center gap-2 mt-6">
            <button onclick="window.lootPrevPage()" class="px-3 py-1.5 bg-gray-700 hover:bg-gray-600 rounded text-sm transition-colors">
                <i class="fas fa-chevron-left mr-1"></i>上一页
            </button>
            <span id="lootPageInfo" class="text-sm text-gray-400 px-4">第 1 页</span>
            <button onclick="window.lootNextPage()" class="px-3 py-1.5 bg-gray-700 hover:bg-gray-600 rounded text-sm transition-colors">
                下一页<i class="fas fa-chevron-right ml-1"></i>
            </button>
        </div>

        <!-- 详情查看模态框 -->
        <div id="lootDetailModal" class="hidden fixed inset-0 bg-black/60 z-50 flex items-center justify-center p-4">
            <div class="bg-gray-800 rounded-xl border border-gray-700 w-full max-w-4xl max-h-[85vh] flex flex-col shadow-2xl">
                <!-- 模态框头部 -->
                <div class="flex items-center justify-between px-6 py-4 border-b border-gray-700">
                    <div class="flex items-center gap-3">
                        <i id="lootDetailIcon" class="fas fa-trophy text-yellow-400 text-lg"></i>
                        <div>
                            <h3 id="lootDetailTitle" class="font-bold text-lg">战利品详情</h3>
                            <div class="flex items-center gap-3 text-xs text-gray-400 mt-1">
                                <span id="lootDetailSource"><i class="fas fa-puzzle-piece mr-1"></i>-</span>
                                <span id="lootDetailBeacon"><i class="fas fa-broadcast-tower mr-1"></i>-</span>
                                <span id="lootDetailTime"><i class="fas fa-clock mr-1"></i>-</span>
                                <span id="lootDetailSize"><i class="fas fa-database mr-1"></i>-</span>
                            </div>
                        </div>
                    </div>
                    <div class="flex items-center gap-2">
                        <button onclick="window.downloadCurrentLoot()" class="px-3 py-1.5 bg-green-600 hover:bg-green-500 rounded-lg text-sm transition-colors">
                            <i class="fas fa-download mr-1"></i>下载
                        </button>
                        <button onclick="window.copyLootContent()" class="px-3 py-1.5 bg-blue-600 hover:bg-blue-500 rounded-lg text-sm transition-colors">
                            <i class="fas fa-copy mr-1"></i>复制
                        </button>
                        <button onclick="window.closeLootDetail()" class="p-2 hover:bg-gray-700 rounded-lg transition-colors">
                            <i class="fas fa-times text-gray-400"></i>
                        </button>
                    </div>
                </div>
                <!-- 模态框内容 -->
                <div class="flex-1 overflow-auto p-6">
                    <pre id="lootDetailContent" class="bg-gray-900 p-4 rounded-lg text-sm font-mono text-green-300 whitespace-pre-wrap break-words border border-gray-700 min-h-[200px]"></pre>
                </div>
            </div>
        </div>
    </div>
</div>
