<div id="tasksPage" class="page-content">
    <div class="max-w-full mx-auto px-6 py-6">

        <!-- ===== 页面标题栏 ===== -->
        <div class="tq-header">
            <div class="tq-header-left">
                <div class="tq-header-icon">
                    <i class="fas fa-tasks"></i>
                </div>
                <div>
                    <h2 class="tq-header-title">任务队列</h2>
                    <p class="tq-header-subtitle">管理与监控所有 Beacon 命令任务的下发与执行状态</p>
                </div>
            </div>
            <div class="tq-header-actions">
                <button class="tq-refresh-btn" onclick="window.refreshTasksPage && window.refreshTasksPage()" title="刷新任务列表">
                    <i class="fas fa-sync-alt"></i>
                    <span>刷新</span>
                </button>
            </div>
        </div>

        <!-- ===== 统计仪表盘 ===== -->
        <div class="tq-stats-grid">
            <div class="tq-stat-card tq-stat-card--total">
                <div class="tq-stat-icon"><i class="fas fa-layer-group"></i></div>
                <div class="tq-stat-body">
                    <div class="tq-stat-value" id="tqStatTotal">0</div>
                    <div class="tq-stat-label">总任务数</div>
                </div>
                <div class="tq-stat-bar"><div class="tq-stat-bar-fill" id="tqBarTotal"></div></div>
            </div>
            <div class="tq-stat-card tq-stat-card--pending">
                <div class="tq-stat-icon"><i class="fas fa-clock"></i></div>
                <div class="tq-stat-body">
                    <div class="tq-stat-value" id="tqStatPending">0</div>
                    <div class="tq-stat-label">等待中</div>
                </div>
                <div class="tq-stat-bar"><div class="tq-stat-bar-fill" id="tqBarPending"></div></div>
            </div>
            <div class="tq-stat-card tq-stat-card--running">
                <div class="tq-stat-icon"><i class="fas fa-spinner"></i></div>
                <div class="tq-stat-body">
                    <div class="tq-stat-value" id="tqStatRunning">0</div>
                    <div class="tq-stat-label">执行中</div>
                </div>
                <div class="tq-stat-bar"><div class="tq-stat-bar-fill" id="tqBarRunning"></div></div>
            </div>
            <div class="tq-stat-card tq-stat-card--completed">
                <div class="tq-stat-icon"><i class="fas fa-check-circle"></i></div>
                <div class="tq-stat-body">
                    <div class="tq-stat-value" id="tqStatCompleted">0</div>
                    <div class="tq-stat-label">已完成</div>
                </div>
                <div class="tq-stat-bar"><div class="tq-stat-bar-fill" id="tqBarCompleted"></div></div>
            </div>
            <div class="tq-stat-card tq-stat-card--failed">
                <div class="tq-stat-icon"><i class="fas fa-times-circle"></i></div>
                <div class="tq-stat-body">
                    <div class="tq-stat-value" id="tqStatFailed">0</div>
                    <div class="tq-stat-label">失败</div>
                </div>
                <div class="tq-stat-bar"><div class="tq-stat-bar-fill" id="tqBarFailed"></div></div>
            </div>
        </div>

        <!-- ===== 筛选 / 搜索栏 ===== -->
        <div class="tq-filter-bar">
            <div class="tq-filter-left">
                <div class="tq-search-box">
                    <i class="fas fa-search tq-search-icon"></i>
                    <input type="text" id="tqSearchInput" class="tq-search-input" placeholder="搜索任务 ID、命令、Beacon…">
                </div>
                <div class="tq-filter-group">
                    <select id="tqStatusFilter" class="tq-filter-select">
                        <option value="">全部状态</option>
                        <option value="pending">⏳ 等待中</option>
                        <option value="running">🔄 执行中</option>
                        <option value="completed">✅ 已完成</option>
                        <option value="failed">❌ 失败</option>
                    </select>
                    <select id="tqTypeFilter" class="tq-filter-select">
                        <option value="">全部类型</option>
                    </select>
                </div>
            </div>
            <div class="tq-filter-right">
                <span class="tq-result-count" id="tqResultCount">0 条任务</span>
            </div>
        </div>

        <!-- ===== 任务列表 ===== -->
        <div class="tq-list-container">
            <div id="tasksList" class="tq-list">
                <!-- 动态生成 -->
            </div>
        </div>
    </div>
</div>
