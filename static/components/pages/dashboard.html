<!-- Dashboard 仪表盘页面 -->
<div id="dashboardPage" class="page-content active">
    <div class="max-w-full mx-auto px-6 py-6">

        <!-- ═══ 标题区域 ═══ -->
        <div class="flex items-center justify-between mb-8">
            <div class="flex items-center space-x-4">
                <div class="dash-title-icon">
                    <i class="fas fa-tachometer-alt text-xl"></i>
                </div>
                <div>
                    <h2 class="text-2xl font-bold text-white tracking-tight">态势仪表盘</h2>
                    <p class="text-sm text-gray-400 mt-0.5">实时监控 · 全局态势感知</p>
                </div>
            </div>
            <div class="dash-status-pill" id="dashStatusPill">
                <span class="dash-status-dot"></span>
                <span class="text-xs font-medium text-emerald-300">系统正常</span>
            </div>
        </div>

        <!-- ═══ 统计卡片 ═══ -->
        <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-5 gap-5 mb-7">
            <!-- 活跃 Beacon -->
            <div class="dash-stat-card dash-stat-green">
                <div class="dash-stat-glow dash-glow-green"></div>
                <div class="flex items-center justify-between relative z-10">
                    <div>
                        <p class="text-xs font-medium text-gray-400 uppercase tracking-wider mb-1.5">活跃 Beacon</p>
                        <p class="text-4xl font-extrabold text-white tabular-nums" id="activeBeacons">0</p>
                        <div class="flex items-center mt-2 space-x-1.5">
                            <span class="dash-trend-badge dash-trend-up" id="activeBeaconTrend">
                                <i class="fas fa-arrow-up text-[0.6rem]"></i>
                                <span>--</span>
                            </span>
                            <span class="text-[0.7rem] text-gray-500">较上次刷新</span>
                        </div>
                    </div>
                    <div class="dash-stat-icon-ring dash-ring-green">
                        <i class="fas fa-signal text-emerald-400 text-lg"></i>
                    </div>
                </div>
                <div class="dash-stat-bar-track mt-3 relative z-10">
                    <div class="dash-stat-bar dash-bar-green" id="activeBeaconBar" style="width: 0%"></div>
                </div>
            </div>
            <!-- 休眠 Beacon -->
            <div class="dash-stat-card dash-stat-amber">
                <div class="dash-stat-glow dash-glow-amber"></div>
                <div class="flex items-center justify-between relative z-10">
                    <div>
                        <p class="text-xs font-medium text-gray-400 uppercase tracking-wider mb-1.5">休眠 Beacon</p>
                        <p class="text-4xl font-extrabold text-white tabular-nums" id="sleepingBeacons">0</p>
                        <div class="flex items-center mt-2 space-x-1.5">
                            <span class="dash-trend-badge dash-trend-flat" id="sleepingBeaconTrend">
                                <i class="fas fa-minus text-[0.6rem]"></i>
                                <span>--</span>
                            </span>
                            <span class="text-[0.7rem] text-gray-500">较上次刷新</span>
                        </div>
                    </div>
                    <div class="dash-stat-icon-ring dash-ring-amber">
                        <i class="fas fa-moon text-amber-400 text-lg"></i>
                    </div>
                </div>
                <div class="dash-stat-bar-track mt-3 relative z-10">
                    <div class="dash-stat-bar dash-bar-amber" id="sleepingBeaconBar" style="width: 0%"></div>
                </div>
            </div>
            <!-- 离线 Beacon -->
            <div class="dash-stat-card dash-stat-red">
                <div class="dash-stat-glow dash-glow-red"></div>
                <div class="flex items-center justify-between relative z-10">
                    <div>
                        <p class="text-xs font-medium text-gray-400 uppercase tracking-wider mb-1.5">离线 Beacon</p>
                        <p class="text-4xl font-extrabold text-white tabular-nums" id="offlineBeacons">0</p>
                        <div class="flex items-center mt-2 space-x-1.5">
                            <span class="dash-trend-badge dash-trend-down" id="offlineBeaconTrend">
                                <i class="fas fa-arrow-down text-[0.6rem]"></i>
                                <span>--</span>
                            </span>
                            <span class="text-[0.7rem] text-gray-500">较上次刷新</span>
                        </div>
                    </div>
                    <div class="dash-stat-icon-ring dash-ring-red">
                        <i class="fas fa-skull-crossbones text-red-400 text-lg"></i>
                    </div>
                </div>
                <div class="dash-stat-bar-track mt-3 relative z-10">
                    <div class="dash-stat-bar dash-bar-red" id="offlineBeaconBar" style="width: 0%"></div>
                </div>
            </div>
            <!-- 活跃监听器 -->
            <div class="dash-stat-card dash-stat-blue">
                <div class="dash-stat-glow dash-glow-blue"></div>
                <div class="flex items-center justify-between relative z-10">
                    <div>
                        <p class="text-xs font-medium text-gray-400 uppercase tracking-wider mb-1.5">活跃监听器</p>
                        <p class="text-4xl font-extrabold text-white tabular-nums" id="activeListeners">0</p>
                        <div class="flex items-center mt-2 space-x-1.5">
                            <span class="text-[0.7rem] text-gray-500">接收连接中</span>
                        </div>
                    </div>
                    <div class="dash-stat-icon-ring dash-ring-blue">
                        <i class="fas fa-satellite-dish text-blue-400 text-lg"></i>
                    </div>
                </div>
                <div class="dash-stat-bar-track mt-3 relative z-10">
                    <div class="dash-stat-bar dash-bar-blue" id="activeListenerBar" style="width: 0%"></div>
                </div>
            </div>
            <!-- 待执行任务 -->
            <div class="dash-stat-card dash-stat-purple">
                <div class="dash-stat-glow dash-glow-purple"></div>
                <div class="flex items-center justify-between relative z-10">
                    <div>
                        <p class="text-xs font-medium text-gray-400 uppercase tracking-wider mb-1.5">待执行任务</p>
                        <p class="text-4xl font-extrabold text-white tabular-nums" id="pendingTasks">0</p>
                        <div class="flex items-center mt-2 space-x-1.5">
                            <span class="text-[0.7rem] text-gray-500">排队等待中</span>
                        </div>
                    </div>
                    <div class="dash-stat-icon-ring dash-ring-purple">
                        <i class="fas fa-bolt text-purple-400 text-lg"></i>
                    </div>
                </div>
                <div class="dash-stat-bar-track mt-3 relative z-10">
                    <div class="dash-stat-bar dash-bar-purple" id="pendingTaskBar" style="width: 0%"></div>
                </div>
            </div>
        </div>

        <!-- ═══ 图表区域（增强版） ═══ -->
        <div class="grid grid-cols-1 lg:grid-cols-2 gap-6 mb-6">

            <!-- ── 协议分布：南丁格尔玫瑰图 + 底部协议卡片 ── -->
            <div class="dash-chart-card">
                <div class="dash-chart-header">
                    <div class="flex items-center space-x-3">
                        <div class="dash-chart-icon-dot" style="background: rgba(168, 85, 247, 0.2); color: #c084fc;">
                            <i class="fas fa-chart-pie text-sm"></i>
                        </div>
                        <div>
                            <h3 class="text-sm font-semibold text-white">协议分布统计</h3>
                            <p class="text-[0.7rem] text-gray-500">南丁格尔玫瑰图 · 实时协议占比</p>
                        </div>
                    </div>
                </div>
                <div id="protocolChart" class="w-full" style="height: 260px;"></div>
                <!-- 底部协议详情卡片 -->
                <div id="protocolLegendCards" class="dash-proto-grid"></div>
            </div>

            <!-- ── 连接趋势：堆叠面积图 + 摘要指标 ── -->
            <div class="dash-chart-card">
                <div class="dash-chart-header">
                    <div class="flex items-center justify-between w-full">
                        <div class="flex items-center space-x-3">
                            <div class="dash-chart-icon-dot" style="background: rgba(59, 130, 246, 0.2); color: #60a5fa;">
                                <i class="fas fa-chart-area text-sm"></i>
                            </div>
                            <div>
                                <h3 class="text-sm font-semibold text-white">Beacon 连接趋势</h3>
                                <p class="text-[0.7rem] text-gray-500">24h 堆叠面积图 · 可拖拽缩放</p>
                            </div>
                        </div>
                        <div class="flex items-center space-x-3">
                            <span class="dash-trend-mini dash-trend-mini-green">
                                <i class="fas fa-circle text-[0.35rem]"></i>
                                <span class="text-[0.65rem]">在线</span>
                            </span>
                            <span class="dash-trend-mini dash-trend-mini-red">
                                <i class="fas fa-circle text-[0.35rem]"></i>
                                <span class="text-[0.65rem]">离线</span>
                            </span>
                        </div>
                    </div>
                </div>
                <!-- 顶部摘要指标条 -->
                <div class="dash-trend-summary">
                    <div class="dash-trend-kpi">
                        <span class="dash-trend-kpi-label">当前在线</span>
                        <span class="dash-trend-kpi-val text-emerald-400" id="trendCurOnline">0</span>
                    </div>
                    <div class="dash-trend-kpi-sep"></div>
                    <div class="dash-trend-kpi">
                        <span class="dash-trend-kpi-label">当前离线</span>
                        <span class="dash-trend-kpi-val text-red-400" id="trendCurOffline">0</span>
                    </div>
                    <div class="dash-trend-kpi-sep"></div>
                    <div class="dash-trend-kpi">
                        <span class="dash-trend-kpi-label">在线峰值</span>
                        <span class="dash-trend-kpi-val text-emerald-300" id="trendPeakOnline">0</span>
                    </div>
                    <div class="dash-trend-kpi-sep"></div>
                    <div class="dash-trend-kpi">
                        <span class="dash-trend-kpi-label">离线峰值</span>
                        <span class="dash-trend-kpi-val text-red-300" id="trendPeakOffline">0</span>
                    </div>
                    <div class="dash-trend-kpi-sep"></div>
                    <div class="dash-trend-kpi">
                        <span class="dash-trend-kpi-label">在线均值</span>
                        <span class="dash-trend-kpi-val text-emerald-200" id="trendAvgOnline">0</span>
                    </div>
                    <div class="dash-trend-kpi-sep"></div>
                    <div class="dash-trend-kpi">
                        <span class="dash-trend-kpi-label">离线均值</span>
                        <span class="dash-trend-kpi-val text-red-200" id="trendAvgOffline">0</span>
                    </div>
                </div>
                <div id="trendChart" class="w-full" style="height: 280px;"></div>
            </div>
        </div>

        <!-- ═══ 实时活动 + 地理分布 ═══ -->
        <div class="grid grid-cols-1 lg:grid-cols-3 gap-6">
            <!-- 实时活动日志 -->
            <div class="dash-chart-card lg:col-span-2">
                <div class="dash-chart-header">
                    <div class="flex items-center justify-between w-full">
                        <div class="flex items-center space-x-3">
                            <div class="dash-chart-icon-dot" style="background: rgba(16, 185, 129, 0.2); color: #34d399;">
                                <i class="fas fa-stream text-sm"></i>
                            </div>
                            <div>
                                <h3 class="text-sm font-semibold text-white">实时活动日志</h3>
                                <p class="text-[0.7rem] text-gray-500">最近事件 &amp; 操作记录</p>
                            </div>
                        </div>
                        <span class="dash-live-badge">
                            <span class="dash-live-dot"></span>
                            <span class="text-[0.65rem] font-semibold uppercase tracking-wider">Live</span>
                        </span>
                    </div>
                </div>
                <div id="activityLog" class="dash-activity-log space-y-1.5 max-h-96 overflow-y-auto"></div>
            </div>
            <!-- 地理位置分布 -->
            <div class="dash-chart-card">
                <div class="dash-chart-header">
                    <div class="flex items-center justify-between w-full">
                        <div class="flex items-center space-x-3">
                            <div class="dash-chart-icon-dot" style="background: rgba(6, 182, 212, 0.2); color: #22d3ee;">
                                <i class="fas fa-globe-asia text-sm"></i>
                            </div>
                            <div>
                                <h3 class="text-sm font-semibold text-white">地理位置分布</h3>
                                <p class="text-[0.7rem] text-gray-500">Beacon 全球部署</p>
                            </div>
                        </div>
                        <button id="updateLocationBtn" class="dash-refresh-btn" title="手动更新所有Beacon的地理位置信息">
                            <i class="fas fa-sync-alt text-xs"></i>
                        </button>
                    </div>
                </div>
                <div id="geoChart" class="w-full h-80"></div>
            </div>
        </div>

    </div>
</div>
