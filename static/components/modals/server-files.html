<!-- server-files 模态框 - 从 1index.html 自动提取 -->
<div id="serverFilesModal" class="fixed inset-0 bg-black/60 backdrop-blur-sm hidden items-center justify-center z-50">
    <div class="bg-gray-800 rounded-xl border border-gray-700 w-full max-w-4xl mx-4 shadow-2xl">
        <div class="flex items-center justify-between p-6 border-b border-gray-700">
            <div class="flex items-center space-x-3">
                <div class="w-10 h-10 bg-green-500/20 rounded-lg flex items-center justify-center">
                    <i class="fas fa-server text-green-400"></i>
                </div>
                <h3 class="text-xl font-bold text-white">服务器文件</h3>
            </div>
            <button onclick="window.closeServerFilesModal()" class="text-gray-400 hover:text-white transition-colors">
                <i class="fas fa-times text-xl"></i>
            </button>
        </div>
        <div class="p-6">
            <div class="mb-4 flex items-center justify-between">
                <p class="text-gray-400 text-sm">从Beacon下载的文件保存在服务器downloads目录</p>
                <button onclick="window.loadServerFiles()" class="bg-gray-700 hover:bg-gray-600 text-white px-4 py-2 rounded-lg transition-colors">
                    <i class="fas fa-sync-alt mr-2"></i>刷新
                </button>
            </div>
            <div id="serverFilesList" class="bg-gray-900/50 rounded-lg border border-gray-700 max-h-96 overflow-y-auto">
                <!-- 文件列表将在这里动态加载 -->
            </div>
        </div>
        <div class="flex items-center justify-end space-x-3 p-6 border-t border-gray-700">
            <button onclick="window.closeServerFilesModal()" class="px-6 py-2.5 bg-gray-600 hover:bg-gray-700 text-white rounded-lg transition-colors">
                关闭
            </button>
        </div>
    </div>
</div>

<!-- DLL动态装载模态框 -->
